<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo da Área do Quadrado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Calculadora: Área do Quadrado</h1>
    <p>Clique no botão abaixo para iniciar o cálculo.</p>
   
    <button onclick="calcularArea()">Calcular Área</button>

    <script>
        function calcularArea() {
           
            let ladoInput = prompt("Digite o valor do lado do quadrado:");

            let lado = parseFloat(ladoInput);

            if (isNaN(lado) || lado <= 0) {
                alert("Por favor, insira um número válido e maior que zero.");
            } else {
               
                let area = lado * lado;
           
                alert("O valor da área do quadrado é: " + area);
            }
        }
    </script>

</body>
</html>
