<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora da área do quadrado</title>
</head>
<body>
    <script>
        let side = Number(prompt("Diga aqui o valor do lado:"))

        

while (side <= 0 ) {
    
    side = Number(prompt("Valor inválido! Por favor, diga um número maior que zero:"));

}
        
        let area = side * side

        alert("O valor da área do quadrado de lado " + side + " é " + area)
    </script>
</body>
</html>
