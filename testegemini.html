<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Idade Canina</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #fffaf0; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #ff9900; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>
    <h1>🐶 Conversor: Idade de Cachorro</h1>
    <p>Clique no botão para descobrir a idade real do seu pet em anos humanos!</p>
    <button onclick="converterIdade()">Descobrir Idade</button>

    <script>
        function converterIdade() {
            let nome = prompt("Qual o nome do seu cachorro?");
            let idadeInput = prompt("Quantos anos o " + nome + " tem?");
            let idadeCachorro = parseInt(idadeInput);

            if (isNaN(idadeCachorro) || idadeCachorro <= 0) {
                alert("Por favor, digite uma idade válida.");
            } else {
                // Cálculo simples: cada ano de cão equivale a 7 anos humanos
                let idadeHumana = idadeCachorro * 7;
                alert("A idade de " + nome + " em anos humanos é: " + idadeHumana + " anos! 🦴");
            }
        }
    </script>
</body>
</html>
