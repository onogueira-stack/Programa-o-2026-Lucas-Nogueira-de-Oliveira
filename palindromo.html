<script>
    let palavra = prompt("Digite uma palavra para ver se é um palíndromo:");
    palavra = palavra.toLowerCase();
    let letrasInvertidas = [];
    for (let i = palavra.length - 1; i >= 0; i--) {
        letrasInvertidas.push(palavra[i]);
    }
    let palavraInvertida = letrasInvertidas.join("");
    if (palavra === palavraInvertida) {
        alert("A palavra '" + palavra + "' É um palíndromo! 🎉");
    } else {
        alert("A palavra '" + palavra + "' NÃO é um palíndromo! ❌");
    }
</script>
